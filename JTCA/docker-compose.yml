version: "3.9"

# ============================================================
# JTCA - Docker Compose
# Services: MongoDB (raw crawl), PostgreSQL (structured data)
# Run: docker-compose up -d
# Stop: docker-compose down
# ============================================================

services:

  # ── MongoDB ─────────────────────────────────────────────
  # Stores raw, unprocessed crawl data before ETL cleaning
  mongodb:
    image: mongo:7.0
    container_name: jtca_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: jtca_user
      MONGO_INITDB_ROOT_PASSWORD: jtca_pass
      MONGO_INITDB_DATABASE: jtca_raw
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL ───────────────────────────────────────────
  # Stores cleaned, validated tariff rules + shipments + audit log
  postgres:
    image: postgres:16-alpine
    container_name: jtca_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jtca_user
      POSTGRES_PASSWORD: jtca_pass
      POSTGRES_DB: jtca
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jtca_user -d jtca"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mongo Express ────────────────────────────────────────
  # Web UI to browse MongoDB raw crawl data
  # Access at: http://localhost:8081
  mongo-express:
    image: mongo-express:1.0.2
    container_name: jtca_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: jtca_user
      ME_CONFIG_MONGODB_ADMINPASSWORD: jtca_pass
      ME_CONFIG_MONGODB_URL: mongodb://jtca_user:jtca_pass@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data:
    driver: local
  pg_data:
    driver: local
